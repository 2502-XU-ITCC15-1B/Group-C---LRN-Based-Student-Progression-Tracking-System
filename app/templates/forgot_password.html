<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Integrated LRN-Based Student Progression Tracking System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(0,103,177,0.34), transparent 34rem),
        linear-gradient(135deg, #06162f 0%, #102a63 46%, #0b3c69 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Century Gothic", CenturyGothic, Arial, sans-serif;
      font-size: 12px;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      background: #f8fbff;
      border-radius: 22px;
      padding: 28px 26px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
    }

    .login-actions {
      display: flex;
      justify-content: center;
      width: 100%;
    }

    .login-title {
      font-weight: 800;
      color: #12376f;
      font-size: 20px;
    }

    .login-subtitle {
      color: #5d6f91;
      font-size: 12px;
      line-height: 1.5;
    }

    .btn-login {
      align-items: center;
      display: inline-flex;
      height: 40px;
      justify-content: center;
      border-radius: 10px;
      background: #0067b1;
      border: none;
      font-weight: 700;
      color: white;
      font-size: 12px;
      max-width: 220px;
      text-decoration: none;
      width: 100%;
    }

    .btn-login:hover {
      background: #00528d;
      color: white;
    }
  </style>
</head>
<body>
  <div class="login-card text-center">
    <h3 class="login-title mb-2">Password Assistance</h3>
    <p class="login-subtitle mb-4">
      Please contact the system administrator to reset your password. For security, account recovery is handled by an admin instead of email.
    </p>
    <div class="login-actions">
      <a href="/login" class="btn btn-login">Back to Login</a>
    </div>
  </div>
</body>
</html>
