<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Integrated LRN-Based Student Progression Tracking System</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, rgba(0,103,177,0.34), transparent 34rem),
        linear-gradient(135deg, #06162f 0%, #102a63 46%, #0b3c69 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Century Gothic", CenturyGothic, Arial, sans-serif;
      font-size: 12px;
    }

    .login-card {
      width: 100%;
      max-width: 340px;
      background: #f8fbff;
      border-radius: 22px;
      padding: 28px 26px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
    }

    .school-logo {
      width: 66px;
      height: 66px;
      object-fit: contain;
      margin-bottom: 12px;
    }

    .login-title {
      font-weight: 800;
      color: #12376f;
      font-size: 20px;
      letter-spacing: .5px;
    }

    .login-subtitle {
      color: #5d6f91;
      font-size: 12px;
    }

    .form-control {
      height: 40px;
      border-radius: 10px;
      border: 1px solid #c9d6ea;
      padding-left: 12px;
      font-size: 12px;
    }

    .form-control:focus {
      border-color: #0067b1;
      box-shadow: 0 0 0 0.2rem rgba(0, 103, 177, 0.15);
    }

    .btn-login {
      height: 40px;
      border-radius: 10px;
      background: #0067b1;
      border: none;
      font-weight: 700;
      color: white;
      font-size: 12px;
    }

    .btn-login:hover {
      background: #00528d;
      color: white;
    }

    .forgot-link {
      font-size: 11px;
      color: #0067b1;
      text-decoration: none;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .system-name {
      font-size: 11px;
      color: #6c7a96;
      margin-top: 14px;
    }
  </style>
</head>

<body>

  <div class="login-card text-center">
    <img src="/rsc/schoolLogo.png" alt="School Logo" class="school-logo">

    <h3 class="login-title mb-1">SIGN IN</h3>
    <p class="login-subtitle mb-3">Enter your account details to continue</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-warning py-2 mb-3 text-start" role="alert">
          {{ messages[0] }}
        </div>
      {% endif %}
    {% endwith %}

    <form action="/login{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}" method="POST">
      <div class="mb-2 text-start">
        <input type="text" name="username" class="form-control" placeholder="Enter ID" value="{{ username or '' }}" required>
      </div>

      <div class="mb-2 text-start">
        <input type="password" name="password" class="form-control" placeholder="Enter Password" required>
      </div>

      <button type="submit" class="btn btn-login w-100 mt-1">LOG IN</button>
    </form>

    <a href="/forgot-password" class="forgot-link d-inline-block mt-3">Forgot password?</a>

    <p class="system-name mb-0">Authorized personnel only</p>

    <p class="system-name">
      Integrated LRN-Based Student Progression Tracking System
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
