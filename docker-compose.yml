services:

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  app:
    build: ./app
    restart: always
    depends_on:
      - db
    ports:
      - "5000:5000"

  web:
    build: ./web
    restart: always
    depends_on:
      - app
    ports:
      - "80:80"

volumes:
  db_data: